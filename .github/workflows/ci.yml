name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + Pint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_sqlite, redis, bcmath, gd
          coverage: pcov
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # Ordem importa: post-autoload-dump roda artisan package:discover,
      # que precisa de um .env presente para nao reclamar de APP_KEY.
      - name: Prepare .env
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate app key
        run: php artisan key:generate

      - name: Static analysis (PHPStan/Larastan)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      # Cobertura via pcov. O --min e um piso conservador contra regressao;
      # eleve conforme a cobertura cresce (mede-se o % real no log deste step).
      - name: Run tests with coverage
        run: |
          php artisan config:clear --ansi
          php artisan test --coverage --min=30

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      # O devkit/ (plugin distribuivel) e gerado a partir de .claude/. Este passo
      # garante que ninguem editou um sem re-sincronizar o outro (sem drift).
      - name: Devkit sincronizado com .claude/
        run: bash bin/sync-devkit.sh --check
